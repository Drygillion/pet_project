name: Run Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # позволяет запускать вручную из интерфейса GitHub

jobs:
  test:
    runs-on: ubuntu-latest  # запускаем на последней версии Ubuntu

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install chromium --with-deps

      - name: Run tests
        run: |
          pytest -v --browser chromium --alluredir=allure-results
          

      # Загрузка скриншотов упавших тестов
      - name: Upload screenshots on failure
        if: always()  # загружаем даже если тесты упали
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: helpers/screenshots/*.png
          if-no-files-found: warn  # не падаем, если скриншотов нет

      # Установка Java для Allure
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Установка Allure CLI
      - name: Install Allure
        run: |
          wget https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz
          tar -zxvf allure-2.29.0.tgz
          sudo mv allure-2.29.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      # Генерация HTML отчета
      - name: Generate Allure Report
        run: |
          allure generate allure-results --clean -o allure-report

      # Upload raw results
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results

      # Upload generated HTML report
      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report