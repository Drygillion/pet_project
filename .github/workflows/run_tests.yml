name: Run Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # позволяет запускать вручную из интерфейса GitHub

jobs:
  test:
    runs-on: ubuntu-latest  # запускаем на последней версии Ubuntu

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install chromium --with-deps

      - name: Run tests
        run: |
          pytest -v --browser chromium --alluredir=allure-results

      - name: Upload Allure results
        if: always()  # даже если тесты упали, загружаем результаты
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results